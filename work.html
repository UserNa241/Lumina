<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  
  <title>LUMINA | Selected Works</title>
  
  <!--  Linking the main stylesheet-->
  <link rel="stylesheet" href="css/main.css">
  <script src="js/app.js" type="module" defer></script>
  
  <!--  Google Fonts Import-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Syncopate:wght@700&display=swap" rel="stylesheet">
</head>

<body>


<!--&lt;!&ndash;Nav Trigger&ndash;&gt;-->

<!--  -->
<!--  &lt;!&ndash;  Interactive Button&ndash;&gt;-->

<!--	MENU-->
<!--  </button>-->

<!--</nav>-->

<!--Page Wrapper-->
<!--<div class="page-wrapper">-->


<main aria-label="Work Page">
  
  <!--	Sticky Header-->
  <header class="work-header" aria-label="Work Controls">
	
	<div class="work-header__inner">
	  <!--		Left Title-->
	  <div class="work-header__title">
		<h1>INDEX</h1>
		<span class="work-count">(0)</span>
	  </div>
	  
	  
	  <!--	  Right Filter Controls-->
	  <nav class="filters" aria-label="Project Filters">
		
		<button class="filter-btn" data-filter="all" aria-pressed="true">All</button>
		<button class="filter-btn" data-filter="branding" aria-pressed="false">Branding</button>
		<button class="filter-btn" data-filter="campaign" aria-pressed="false">Campaign</button>
		<button class="filter-btn" data-filter="interactive" aria-pressed="false">Interactive</button>
		
		
		<!--		Visual Glider-->
		<div class="filter-glider"></div>
	  
	  </nav>
	</div>
  </header>
  
  <!--	Grid Container-->
  <section class="work-grid" id="work-grid">
	<div class="work-grid__content" id="work-grid-content"></div>
	
  </section>

  
  <!-- Case Overlay (HTML Shell) -->
  <dialog class="case-modal" id="case-modal" aria-label="case-modal-title">
    <div class="case-modal__inner">
  
      <!-- Close (top-right) -->
      <form class="case-modal__close-wrap" method="dialog">
        <button class="case-modal__close" type="submit" aria-label="Close case study">
		  <span class="material-symbols-outlined">
		  close
		  </span>
        </button>
      </form>
  
      <!-- Fullscreen hero media -->
      <figure class="case-modal__media">
        <!-- JS will replace src/alt -->
        <img class="case-modal__img" src="" alt="" />
      </figure>
	  
      <aside class="case-modal__panel" aria-label="Case details">
        <h2 class="case-modal__title" id="case-modal-title">Project Title</h2>
		
          <div class="case-modal__detail">
            <p class="case-modal__value case-modal__year">2024</p>
            <p class="case-modal__value case-modal__category">Branding</p>
          </div>
      </aside>
  
    </div>
  </dialog>

</main>

<!--</div>-->

</body>
</html>
